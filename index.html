<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คู่มือการใช้งาน - CS Knowledge Base</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1a73e8;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #5f6368;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            /* เว้นระยะซ้ายมือ 260px เพื่อหลบเมนู */
            padding: 60px 40px 60px calc(var(--sidebar-width) + 40px);
        }

        /* ส่วนของ Header ประจำหน้า */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            color: var(--primary-color);
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        /* -------------------------------------------------- */
        /* โครงสร้าง Grid 3 คอลัมน์ ตามรูปที่แนบมา */
        /* -------------------------------------------------- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* แบ่งเป็น 3 คอลัมน์เท่ากัน */
            gap: 30px; /* ระยะห่างระหว่างกล่อง */
            max-width: 1000px;
            margin: 0 auto;
        }

        /* สไตล์ของกล่อง (Card) ตามรูปวาด */
        .manual-card {
            background-color: var(--card-bg);
            border: 3px solid #000000; /* ขอบสีดำหนาตามรูปวาด */
            border-radius: 40px; /* ขอบมนมากตามรูปวาด */
            padding: 40px 20px;
            aspect-ratio: 1 / 1; /* บังคับให้เป็นทรงสี่เหลี่ยมจัตุรัส */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none; /* เอาเส้นใต้ลิงก์ออก */
            color: inherit;
        }

        .manual-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary-color); /* เปลี่ยนสีขอบเวลาชี้ */
        }

        .manual-card .header-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #000;
        }

        .manual-card .body-text {
            font-size: 16px;
            font-weight: 400;
            color: #333;
        }

        /* การปรับแต่งสำหรับหน้าจอมือถือ */
        @media (max-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr); /* เหลือ 2 คอลัมน์ในแท็บเล็ต */
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 120px 20px 40px 20px; /* เว้นที่ด้านบนให้เมนูมือถือ */
            }
            .grid-container {
                grid-template-columns: 1fr; /* เหลือ 1 คอลัมน์ในมือถือ */
            }
            .manual-card {
                aspect-ratio: auto; /* มือถือไม่ต้องจัตุรัสก็ได้ */
                padding: 30px;
            }
        }
    </style>
</head>
<body>
